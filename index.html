<!DOCTYPE html>
<html>
<head>
<meta http-equiv="Content-type" content="text/html; charset=UTF-8">
<title>Device Sell Form</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f4f6f9;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 20px;
    }

    .form-container {
        background: white;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        width: 420px;
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
    }

    label {
        display: block;
        margin-top: 12px;
        font-weight: bold;
    }

    input, select, textarea {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
        border-radius: 5px;
        border: 1px solid #ccc;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    textarea {
        resize: vertical;
    }

    input[type="submit"] {
        background-color: #0176d3;
        color: white;
        border: none;
        margin-top: 20px;
        padding: 10px;
        cursor: pointer;
        font-size: 16px;
    }

    input[type="submit"]:hover {
        background-color: #015bb5;
    }
</style>
</head>

<body>

<div class="form-container">
<h2>Sell Your Device</h2>

<form action="https://webto.salesforce.com/servlet/servlet.WebToLead?encoding=UTF-8&orgId=00Dfj00000Honsl" method="POST">

<input type="hidden" name="oid" value="00Dfj00000Honsl">
<input type="hidden" name="retURL" value="https://panosarvan.github.io/salesforce-webform-demo/congrats.html">
<input type="hidden" name="lead_source" value="Web">

<!-- Basic Info -->

<label for="first_name">First Name</label>
<input id="first_name" maxlength="40" name="first_name" type="text" required>

<label for="last_name">Last Name</label>
<input id="last_name" maxlength="80" name="last_name" type="text" required>

<label for="email">Email</label>
<input id="email" maxlength="80" name="email" type="email" required>

<label for="phone">Phone</label>
<input id="phone" maxlength="40" name="phone" type="text">

<label for="city">City</label>
<input id="city" maxlength="40" name="city" type="text">

<!-- Device Info -->

<label>Device Type</label>
<select id="00Nfj00003BWQFe" name="00Nfj00003BWQFe" required>
    <option value="">--Select--</option>
    <option value="Smartphone">Smartphone</option>
    <option value="Laptop/Desktop">Laptop/Desktop</option>
</select>

<label>Device Model</label>
<input id="00Nfj00003ALoQj" maxlength="100" name="00Nfj00003ALoQj" type="text">

<label>Device Condition</label>
<select id="00Nfj00003ALXwA" name="00Nfj00003ALXwA">
    <option value="">--Select--</option>
    <option value="Excellent">Excellent</option>
    <option value="Good">Good</option>
    <option value="Fair">Fair</option>
    <option value="Poor">Poor</option>
</select>

<label>Purchase Year</label>
<input id="00Nfj00003BWYK3" name="00Nfj00003BWYK3" type="date">

<label>Seller’s Estimated Price (€)</label>
<input id="00Nfj00003BHGuv" name="00Nfj00003BHGuv" type="number" step="0.01">

<label>Product Details</label>
<textarea id="00Nfj00003BHHFt" name="00Nfj00003BHHFt" rows="4"></textarea>

<input type="submit" value="Submit Offer">

</form>
</div>

</body>
</html>
